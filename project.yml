name: Tender
options:
  bundleIdPrefix: com.shimondeitel.tender
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Tender:
    type: application
    platform: iOS
    sources:
      - path: Tender
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tender
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tender/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TenderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TenderTests
      - path: Tender.storekit
    dependencies:
      - target: Tender
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tender.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TenderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TenderUITests
    dependencies:
      - target: Tender
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tender.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Tender:
    build:
      targets:
        Tender: all
        TenderTests: [test]
        TenderUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Tender.storekit
    test:
      config: Debug
      storeKitConfiguration: Tender.storekit
      targets:
        - TenderTests
        - TenderUITests
    archive:
      config: Release
